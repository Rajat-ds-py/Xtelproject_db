services:
  postgres:
    image: postgres:16

    container_name: ai_receptionist_db

    environment:
      POSTGRES_DB: ai_receptionist_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root

    ports:
      - "5432:5432"

    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
